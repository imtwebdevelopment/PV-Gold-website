<svg width="1000" height="1000" viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="mesh" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#00843d" stroke-width="0.5" stroke-opacity="0.1"/>
      <circle cx="0" cy="0" r="1.5" fill="#d4af37" fill-opacity="0.2"/>
    </pattern>
    <radialGradient id="grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#mesh)" />
  <rect width="100%" height="100%" fill="url(#grad)" opacity="0.5" />
</svg>
