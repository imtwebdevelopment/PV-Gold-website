<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="organicNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend in="SourceGraphic" in2="noise" mode="multiply" opacity="0.4" />
    </filter>
    <radialGradient id="cardGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0a2a1a" />
      <stop offset="100%" stop-color="#061a10" />
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#cardGrad)" />
  <rect width="100%" height="100%" fill="#061a10" opacity="0.1" filter="url(#organicNoise)" />
  <path d="M-100 400C100 300 300 500 500 400C700 300 900 500 1100 400" stroke="#00843d" stroke-width="0.5" stroke-opacity="0.2" fill="none">
    <animate attributeName="d" dur="20s" repeatCount="indefinite" values="M-100 400C100 300 300 500 500 400C700 300 900 500 1100 400;M-100 400C100 500 300 300 500 400C700 500 900 300 1100 400;M-100 400C100 300 300 500 500 400C700 300 900 500 1100 400" />
  </path>
  <path d="M-100 500C100 400 300 600 500 500C700 400 900 600 1100 500" stroke="#00843d" stroke-width="0.5" stroke-opacity="0.1" fill="none">
    <animate attributeName="d" dur="25s" repeatCount="indefinite" values="M-100 500C100 400 300 600 500 500C700 400 900 600 1100 500;M-100 500C100 600 300 400 500 500C700 600 900 400 1100 500;M-100 500C100 400 300 600 500 500C700 400 900 600 1100 500" />
  </path>
</svg>
